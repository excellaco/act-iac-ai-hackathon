name: Pipeline — Field Extraction

on:
  workflow_dispatch:
    inputs:
      jurisdiction:
        description: 'Jurisdiction slug'
        required: true
        type: choice
        options:
          - fairfax_va
          - arlington_va
          - loudoun_va
      zone:
        description: 'Zone code (leave blank to run all zones)'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  field-extraction:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-actions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Run field extraction
        run: npm run pipeline:extract "${{ inputs.jurisdiction }}" "${{ inputs.zone }}"
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          RAW_DATA_BUCKET: parcela-490518-raw-data
          GEMINI_MODEL: gemini-2.5-flash

      - name: Sync artifacts from GCS
        run: npm run artifacts:sync ${{ inputs.jurisdiction }}
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          RAW_DATA_BUCKET: parcela-490518-raw-data

      - name: Create PR with field extraction results
        env:
          GH_TOKEN: ${{ github.token }}
          JURISDICTION: ${{ inputs.jurisdiction }}
          ZONE: ${{ inputs.zone }}
          RUN_ID: ${{ github.run_id }}
        run: |
          BRANCH="artifacts/${JURISDICTION}/extract-${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"

          # Stage field artifact files, excluding page-map artifacts
          git add "data/artifacts/${JURISDICTION}/" -- ':!*_pages.json'

          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi

          ZONE_LABEL="${ZONE:-all zones}"
          git commit -m "artifacts(${JURISDICTION}): field extraction results — ${ZONE_LABEL} [run ${RUN_ID}]"
          git push origin "${BRANCH}"

          # Check whether a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "${BRANCH}" --json url --jq '.[0].url' 2>/dev/null || true)

          if [ -n "${EXISTING_PR}" ]; then
            echo "PR already exists: ${EXISTING_PR}"
          else
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "artifacts(${JURISDICTION}): field extraction results" \
              --body "## Field Extraction Results — \`${JURISDICTION}\` / zone: \`${ZONE_LABEL}\`

This PR was opened automatically by the **Pipeline — Field Extraction** workflow (run [${RUN_ID}](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID})).

## Reviewer checklist

- [ ] Review each zone fields JSON file under \`data/artifacts/${JURISDICTION}/\`.
- [ ] Verify the extracted field values are accurate against the source zoning ordinance.
- [ ] Set \`\"approved\": true\` in each zone fields JSON file you want the Load stage to persist to the database.
- [ ] Save the files and commit the changes to this branch before merging.

> **Note:** Only zone fields files with \`\"approved\": true\` will be loaded into the database by Stage 3 (\`pipeline-load\`)."
          fi
