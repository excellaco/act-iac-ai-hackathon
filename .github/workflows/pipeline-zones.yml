name: Pipeline — Zone Discovery
# workflow_dispatch trigger is required — do not remove

on:
  workflow_dispatch:
    inputs:
      jurisdiction:
        description: 'Jurisdiction slug'
        required: true
        type: choice
        options:
          - fairfax_va
          - arlington_va
          - loudoun_va

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  zone-discovery:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-actions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Start Cloud SQL Auth Proxy
        run: |
          curl -sLo cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy ${{ secrets.GCP_PROJECT_ID }}:us-central1:parcela --port=5432 &
          sleep 5

      - name: Check pages artifact exists
        run: |
          PAGES_PATH="zoning/${{ inputs.jurisdiction }}/artifacts/${{ inputs.jurisdiction }}_pages.json"
          if ! gcloud storage ls "gs://parcela-490518-raw-data/${PAGES_PATH}" > /dev/null 2>&1; then
            echo "ERROR: Pages artifact not found at gs://parcela-490518-raw-data/${PAGES_PATH}"
            echo ""
            echo "Run the Pipeline — Document Pre-processing workflow first:"
            echo "  https://github.com/${{ github.repository }}/actions/workflows/pipeline-parse.yml"
            exit 1
          fi
          echo "Pages artifact found — proceeding with zone discovery."
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}

      - name: Run zone discovery
        run: npm run pipeline:zones ${{ inputs.jurisdiction }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_MIGRATE }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          RAW_DATA_BUCKET: parcela-490518-raw-data
          GEMINI_MODEL: gemini-2.5-flash

      - name: Sync artifacts from GCS
        run: npm run artifacts:sync ${{ inputs.jurisdiction }}
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          RAW_DATA_BUCKET: parcela-490518-raw-data

      - name: Create PR with zone discovery results
        env:
          GH_TOKEN: ${{ github.token }}
          JURISDICTION: ${{ inputs.jurisdiction }}
          RUN_ID: ${{ github.run_id }}
          PR_BODY: |
            ## Zone Discovery Results — `${{ inputs.jurisdiction }}`

            This PR was opened automatically by the **Pipeline — Zone Discovery** workflow (run [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})).

            ## Reviewer checklist

            - [ ] Open `data/artifacts/${{ inputs.jurisdiction }}/${{ inputs.jurisdiction }}_zones.json` (or the equivalent zones file).
            - [ ] Review the discovered zones for accuracy.
            - [ ] Set `"approved": true` on each zone entry you want Stage 2 (Field Extraction) to process.
            - [ ] Save the file and commit the change to this branch before merging.

            > **Important:** Merging this PR without setting `approved: true` on at least one zone will cause Stage 2 (`pipeline-extract`) to skip all zones for this jurisdiction.
        run: |
          BRANCH="artifacts/${JURISDICTION}/zones-${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"

          # Stage zones JSON files, excluding page-map artifacts
          git add "data/artifacts/${JURISDICTION}/" -- ':!*_pages.json'

          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi

          git commit -m "artifacts(${JURISDICTION}): zone discovery results [run ${RUN_ID}]"
          git push origin "${BRANCH}"

          # Check whether a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "${BRANCH}" --json url --jq '.[0].url' 2>/dev/null || true)

          if [ -n "${EXISTING_PR}" ]; then
            echo "PR already exists: ${EXISTING_PR}"
          else
            printf '%s' "$PR_BODY" > /tmp/pr-body.md
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "artifacts(${JURISDICTION}): zone discovery results" \
              --body-file /tmp/pr-body.md
          fi
