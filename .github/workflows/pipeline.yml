# DEPRECATED — Migration period
#
# This workflow is superseded by four stage-specific workflows introduced in
# the refactor/extraction-pipeline-v2 branch.  Please use those instead:
#
#   pipeline-zones.yml   — Stage 1: Zone Discovery
#   pipeline-extract.yml — Stage 2: Field Extraction
#   pipeline-load.yml    — Stage 3: Load to Database
#   pipeline-score.yml   — Stage 4: Scoring
#
# This file will be removed once all teams have migrated to the new workflows.

name: Extraction Pipeline

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Pipeline stage to run'
        required: false
        default: 'run'
        type: choice
        options:
          - run
          - zones
          - extract
          - load
          - page-resolve
          - score
          - purge
      jurisdiction:
        description: 'Jurisdiction to process (leave blank for all 3)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - fairfax_va
          - arlington_va
          - loudoun_va
      log_level:
        description: 'Log level (debug for verbose chunk progress)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - debug

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-actions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Start Cloud SQL Auth Proxy
        run: |
          curl -sLo cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy ${{ secrets.GCP_PROJECT_ID }}:us-central1:parcela --port=5432 &
          sleep 5

      - name: Run extraction pipeline
        run: npm run pipeline:${{ github.event.inputs.stage || 'run' }} ${{ github.event.inputs.jurisdiction }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_MIGRATE }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          RAW_DATA_BUCKET: parcela-490518-raw-data
          GEMINI_MODEL: gemini-2.5-flash
          LOG_LEVEL: ${{ github.event.inputs.log_level }}

      - name: Sync artifacts from GCS
        if: ${{ github.event.inputs.stage == 'zones' || github.event.inputs.stage == 'extract' }}
        run: npm run artifacts:sync ${{ github.event.inputs.jurisdiction }}
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          RAW_DATA_BUCKET: parcela-490518-raw-data

      - name: Create PR with zone discovery results
        if: ${{ github.event.inputs.stage == 'zones' }}
        env:
          GH_TOKEN: ${{ github.token }}
          JURISDICTION: ${{ github.event.inputs.jurisdiction }}
          RUN_ID: ${{ github.run_id }}
        run: |
          BRANCH="artifacts/${JURISDICTION}/zones-${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"

          # Stage zones JSON files, excluding page-map artifacts
          git add "data/artifacts/${JURISDICTION}/" -- ':!*_pages.json'

          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi

          git commit -m "artifacts(${JURISDICTION}): zone discovery results [run ${RUN_ID}]"
          git push origin "${BRANCH}"

          EXISTING_PR=$(gh pr list --head "${BRANCH}" --json url --jq '.[0].url' 2>/dev/null || true)

          if [ -n "${EXISTING_PR}" ]; then
            echo "PR already exists: ${EXISTING_PR}"
          else
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "artifacts(${JURISDICTION}): zone discovery results" \
              --body "## Zone Discovery Results — \`${JURISDICTION}\`

This PR was opened automatically by the **Extraction Pipeline** workflow (run [${RUN_ID}](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID})).

## Reviewer checklist

- [ ] Open \`data/artifacts/${JURISDICTION}/${JURISDICTION}_zones.json\` (or the equivalent zones file).
- [ ] Review the discovered zones for accuracy.
- [ ] Set \`\"approved\": true\` on each zone entry you want Stage 2 (Field Extraction) to process.
- [ ] Save the file and commit the change to this branch before merging.

> **Important:** Merging this PR without setting \`approved: true\` on at least one zone will cause Stage 2 (\`pipeline-extract\`) to skip all zones for this jurisdiction."
          fi

      - name: Create PR with field extraction results
        if: ${{ github.event.inputs.stage == 'extract' }}
        env:
          GH_TOKEN: ${{ github.token }}
          JURISDICTION: ${{ github.event.inputs.jurisdiction }}
          RUN_ID: ${{ github.run_id }}
        run: |
          BRANCH="artifacts/${JURISDICTION}/extract-${RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${BRANCH}"

          # Stage field artifact files, excluding page-map artifacts
          git add "data/artifacts/${JURISDICTION}/" -- ':!*_pages.json'

          if git diff --cached --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi

          ZONE_LABEL="${ZONE:-all zones}"
          git commit -m "artifacts(${JURISDICTION}): field extraction results — ${ZONE_LABEL} [run ${RUN_ID}]"
          git push origin "${BRANCH}"

          EXISTING_PR=$(gh pr list --head "${BRANCH}" --json url --jq '.[0].url' 2>/dev/null || true)

          if [ -n "${EXISTING_PR}" ]; then
            echo "PR already exists: ${EXISTING_PR}"
          else
            gh pr create \
              --base main \
              --head "${BRANCH}" \
              --title "artifacts(${JURISDICTION}): field extraction results" \
              --body "## Field Extraction Results — \`${JURISDICTION}\`

This PR was opened automatically by the **Extraction Pipeline** workflow (run [${RUN_ID}](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID})).

## Reviewer checklist

- [ ] Review each zone fields JSON file under \`data/artifacts/${JURISDICTION}/\`.
- [ ] Verify the extracted field values are accurate against the source zoning ordinance.
- [ ] Set \`\"approved\": true\` in each zone fields JSON file you want the Load stage to persist to the database.
- [ ] Save the files and commit the changes to this branch before merging.

> **Note:** Only zone fields files with \`\"approved\": true\` will be loaded into the database by Stage 3 (\`pipeline-load\`)."
          fi
