  <rect x="10" y="26" width="8" height="8" rx="1" fill="#818cf8" opacity="0.8"/>
  <rect x="22" y="26" width="8" height="8" rx="1" fill="#6366f1" opacity="0.8"/>
  <!-- Wordmark -->
  <text x="46" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#111827" letter-spacing="-0.5">Parcella</text>
